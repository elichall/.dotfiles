# ==============================================================================
# MAIN TMUX CONFIGURATION (~/.tmux.conf)
# ==============================================================================

# Core Settings for Terminal Compatibility
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set-option -g detach-on-destroy off
set -s escape-time 0

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start window/pane indexing at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==============================================================================
# VISUAL THEME HOOK (Sourced Dynamically from global theme engine)
# ==============================================================================
if-shell '[ -f ~/.config/tmux/colors.tmux ]' 'source-file ~/.config/tmux/colors.tmux'

# ==============================================================================
# PLUGINS (Managed via TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Vim-Tmux-Navigator Plugin
set -g @plugin 'christoomey/vim-tmux-navigator'

# yank integration
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto' # fzf search and yank from buffer

# session managing
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# configure plugins
# Keep Neovim sessions alive inside tmux splits
set -g @resurrect-strategy-nvim 'session'
# Enable automatic restoration on boot
set -g @continuum-restore 'on'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @extrakto_key "f"
# default line search for extrakto
set -g @extrakto_filter_order "line word all"
TMUX_FZF_LAUNCH_KEY="tab"

# Initialize TMUX plugin manager (Keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# BINDINGS (Layered: Pane -> Window -> Session)
# ==============================================================================

# --- YANKING & COPY MODE ---
unbind [
bind v copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-key -X begin-selection
bind-key -T copy-mode-vi C-v send-key -X rectangle-toggle
bind-key -T copy-mode-vi y send-key -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-key -X cancel

bind p run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"

# --- 1. PANE MANAGEMENT LAYER ---
# Creation (Splitting)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Movement (Break pane out into its own background window)
bind b break-pane -d

# Resizing (Vim-style, Repeatable with arrows)
bind -r Left resize-pane -L 10
bind -r Down resize-pane -D 10
bind -r Up resize-pane -U 10
bind -r Right resize-pane -R 10

# Text Clearing / Destruction
# Prefix + Ctrl+x -> Destroys all other panes in the current window except the active one
bind C-x confirm-before -p "Kill all other panes in window? (y/n)" "kill-pane -a"

# --- 2. WINDOW MANAGEMENT LAYER ---
# Creation
bind n new-window -c "#{pane_current_path}"

# Switching (No prefix layer needed: Alt + h/l protects your terminal Ctrl hotkeys)
bind -n M-h previous-window
bind -n M-l next-window

# Destruction (Prefix + Shift+x -> Destroys the current window immediately)
bind X confirm-before -p "Kill current window? (y/n)" kill-window

# --- 3. SESSION MANAGEMENT LAYER ---
# Creation (Uses tmux-fzf's advanced prompt to safely build and move to new sessions)
bind N run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh new"

# State Saving (tmux-resurrect hook)
bind S run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"

# Switching (Triggers the interactive tmux-fzf session switcher window)
bind s run-shell "~/.tmux/plugins/tmux-fzf/scripts/session.sh"
bind -n M-C-h switch-client -p
bind -n M-C-l switch-client -n

# Destruction (Prefix + Ctrl+Shift+X -> Switches to main, then kills current session)
bind C-X confirm-before -p "Kill current session? (y/n)" "run-shell 'tmux has-session -t main 2>/dev/null || tmux new-session -d -s main; tmux switch-client -t main && tmux kill-session -t \"#{session_name}\"'"

# Destruction (Prefix + Ctrl+Alt+Shift+X -> Wipes all sessions except main)
bind M-C-X confirm-before -p "Clear all sessions except main? (y/n)" "run-shell 'tmux has-session -t main 2>/dev/null || tmux new-session -d -s main; tmux list-sessions -F \"##S\" | grep -v \"^main$\" | xargs -I {} tmux kill-session -t {}'"
