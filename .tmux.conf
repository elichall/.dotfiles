# ==============================================================================
# MAIN TMUX CONFIGURATION (~/.tmux.conf)
# ==============================================================================

# Core Settings for Terminal Compatibility
set -g default-terminal "substring-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on

# Set prefix to Ctrl-a (Optional, but industry standard for ergonomics)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start window/pane indexing at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==============================================================================
# PLUGINS (Managed via TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Vim-Tmux-Navigator Plugin
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager (Keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
